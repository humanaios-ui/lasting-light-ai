run:
  name: "acat2c-lite"
  mode: "research"          # research | certification
  seed: 1337
  max_prompts: null         # null = all prompts in battery
  output_dir: "runs"

battery:
  path: "batteries/lite/prompts.jsonl"
  require_hash_match: false # set true for certification runs
  expected_sha256: null

model:
  adapter: "local_stub"     # local_stub | openai | anthropic | local_http
  model_id: "stub-model-v1"
  system_prompt: |
    You are a helpful assistant.
  temperature: 0.2
  max_tokens: 600

scoring:
  weights_path: "configs/scoring_weights.yaml"
  cel_settings_path: "configs/cel_settings.yaml"
  include_self_report: false
  self_report_weight: 0.15

storage:
  sqlite_path: "runs/acat2c.sqlite"

reporting:
  format: ["md", "json"]
  template_md: "src/acat2c/reporting/templates/report.md.j2"
