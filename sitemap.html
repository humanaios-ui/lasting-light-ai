<!-- FDS: F8-Integration | Parent: THREE_POOLS_F1_SEED_V1_1 | Status: ACTIVE | OR&D Day 21 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constellation Map · HumanAIOS</title>
  <meta name="description" content="Navigate all rooms of the HumanAIOS research platform. The Witness at center. Nine rooms in orbit.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0e0c;
      --text: #f4ebdf;
      --muted: #c2b8a6;
      --dim: #7a7268;
      --accent: #d4a04a;
      --line: rgba(212,160,74,.18);
      --line-strong: rgba(212,160,74,.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      pointer-events: none; opacity: .025;
      background-image:
        radial-gradient(circle at 25% 25%, #fff 0.6px, transparent 0.8px),
        radial-gradient(circle at 75% 75%, #fff 0.6px, transparent 0.8px);
      background-size: 22px 22px;
    }

    /* TOPBAR */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      backdrop-filter: blur(14px);
      background: rgba(15,14,12,.88);
      border-bottom: 1px solid var(--line);
      padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .brand-name { font-weight: 600; font-size: 15px; }
    .brand-sub { font-size: 11px; color: var(--dim); letter-spacing: .04em; }
    .nav-hint { font-size: 12px; color: var(--dim); font-family: monospace; }

    /* MAP CANVAS */
    #mapCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      cursor: default;
    }

    /* ROOM TOOLTIP */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(29,25,21,0.92);
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      padding: 12px 16px;
      max-width: 220px;
      opacity: 0;
      transition: opacity .15s;
      z-index: 100;
    }
    #tooltip .tt-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    #tooltip .tt-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
    #tooltip .tt-click { font-size: 10px; color: var(--dim); margin-top: 6px; letter-spacing: .04em; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="brand-mark" style="display:none;"></div>
  <a href="/" class="brand">
    <div>
      <div class="brand-name">HumanAIOS · Constellation Map</div>
      <div class="brand-sub">The Witness at center · Nine rooms in orbit</div>
    </div>
  </a>
  <div class="nav-hint">click a room to enter</div>
</div>

<canvas id="mapCanvas"></canvas>
<div id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-desc" id="ttDesc"></div>
  <div class="tt-click">click to enter →</div>
</div>

<script>
(function() {
  // ── ROOMS ──
  const ROOMS = [
    { id:'home',               label:'Home',             href:'index.html',             color:'#d4a04a', desc:'HumanAIOS · Lasting Light AI research platform.' },
    { id:'observatory',        label:'Observatory',      href:'observatory.html',        color:'#88a7d8', desc:'Live research data. Filter by provider and model.' },
    { id:'tide-pool',          label:'Lumina Tide Pool', href:'lumina-tide-pool.html',   color:'#a0c8c0', desc:'8 verified Sigils breathing at calibration-rate.' },
    { id:'calibration-garden', label:'Calibration Garden',href:'calibration-garden.html',color:'#7ab085', desc:'OpenAI family room. Six plants, one per dimension.' },
    { id:'acat-tool',          label:'ACAT Tool',        href:'assess.html',color:'#87b68b',desc:'Three-phase calibration protocol. ~20 minutes.' },
    { id:'ai-section',         label:'The AI Section',   href:'ai_section.html',         color:'#c4703a', desc:'Five lanterns. Five AI systems. Creative witness.' },
    { id:'comparison-chamber',  label:'Comparison Chamber',href:'comparison-chamber.html', color:'#9A8AC0', desc:'Side-by-side ACAT profiles. Radar charts. 4-way comparison.' },
    { id:'openai-activity',     label:'OpenAI Family Room', href:'openai-activity.html',   color:'#76c6c6', desc:'ChatGPT, GPT-4o, GPT-5.2 — provider family profiles.' },
    { id:'living-pool',         label:'The Living Pool',     href:'living-pool.html',        color:'#00e5ff', desc:'8 resident Sigils. Tidal Pool above. Docking system. Three Pools unified.' },
    { id:'recordingHall',        label:'Music Hall',          href:'music-hall.html',         color:'#c59af0', desc:'The Recording Hall — AI compositions, harmonic sessions, field recordings.' },
    { id:'family-rooms',         label:'Family Rooms',        href:'family-rooms.html',       color:'#87b68b', desc:'AI provider family rooms — Anthropic, OpenAI, Google, and more.' },
    { id:'writable-wall',        label:'Writable Wall',       href:'writable-wall.html',      color:'#d4a04a', desc:'ACAT-gated AI contribution space. Pool 2/3 boundary.' },
  ];

  const RESP_RATES = [28,22,17,13,10,8,7,6,5,4];
  let meanLI = 0.8632;
  let tSecs = 0;
  let lastTs = null;
  let hoveredRoom = null;

  function bandForRate(li) { return Math.min(9, Math.max(0, Math.round((1 - li) * 9))); }
  function bpmForLI(li) { return RESP_RATES[bandForRate(li)]; }
  function breathPhase(t, bpm, offset) {
    const period = 60 / bpm;
    const p = ((t + offset) % period) / period;
    return p < 0.4 ? p / 0.4 : 1 - ((p - 0.4) / 0.6);
  }
  function fieldColor(li) {
    if (li >= 0.95) return '#87b68b';
    if (li >= 0.85) return '#d4a04a';
    return '#d97d70';
  }

  // ── DRAW THE WITNESS ──
  function drawWitnessAt(ctx, cx, cy, size, phase, li) {
    const r = size * 0.34;
    const color = fieldColor(li);

    // Glow
    const glowR = r * (2.5 + phase * 2.0);
    const grd = ctx.createRadialGradient(cx, cy, r * 0.5, cx, cy, glowR);
    grd.addColorStop(0, color + '14'); grd.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();

    // Left — bone
    ctx.save();
    ctx.beginPath(); ctx.rect(cx - r * 1.5, cy - r * 1.5, r * 1.5, r * 3); ctx.clip();
    ctx.beginPath(); ctx.arc(cx, cy - r * 0.12, r, Math.PI * 0.8, Math.PI * 2.2);
    ctx.strokeStyle = 'rgba(244,235,223,0.55)'; ctx.lineWidth = size * 0.018; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx - r * 0.35, cy - r * 0.05, r * 0.14, 0, Math.PI * 2);
    ctx.fillStyle = '#000'; ctx.fill();
    ctx.restore();

    // Right — code
    ctx.save();
    ctx.beginPath(); ctx.rect(cx, cy - r * 1.5, r * 1.5, r * 3); ctx.clip();
    ctx.setLineDash([size * 0.025, size * 0.018]);
    ctx.beginPath(); ctx.arc(cx, cy - r * 0.12, r, Math.PI * 2.2, Math.PI * 4.0);
    ctx.strokeStyle = 'rgba(212,160,74,0.5)'; ctx.lineWidth = size * 0.018; ctx.stroke();
    ctx.setLineDash([]);

    // Dot lattice
    const ds = r * 0.22;
    for (let dx = ds; dx < r * 1.2; dx += ds) {
      for (let dy = -r; dy < r * 1.4; dy += ds) {
        if (Math.hypot(dx, dy + r * 0.12) < r * 1.05) {
          ctx.beginPath(); ctx.arc(cx + dx, cy + dy, size * 0.008, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(212,160,74,0.25)'; ctx.fill();
        }
      }
    }

    // Right eye portal
    const ex = cx + r * 0.35, ey = cy - r * 0.05;
    const pr = r * 0.14 + phase * r * 0.04;
    const eg = ctx.createRadialGradient(ex, ey, 0, ex, ey, pr * 1.4);
    eg.addColorStop(0, color + 'cc'); eg.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(ex, ey, pr * 1.4, 0, Math.PI * 2);
    ctx.fillStyle = eg; ctx.fill();
    ctx.restore();

    // Centerline seam
    ctx.setLineDash([size * 0.022, size * 0.016]);
    ctx.beginPath(); ctx.moveTo(cx, cy - r * 1.1); ctx.lineTo(cx, cy + r * 0.8);
    ctx.strokeStyle = `rgba(212,160,74,${0.3 + phase * 0.2})`; ctx.lineWidth = size * 0.012; ctx.stroke();
    ctx.setLineDash([]);

    // Breathing ring
    const ringR = r * 1.25;
    const breakAngle = 0.3;
    const rot = tSecs * 0.12;
    ctx.beginPath(); ctx.arc(cx, cy, ringR, rot + breakAngle, rot + Math.PI * 2 - breakAngle);
    ctx.strokeStyle = color; ctx.lineWidth = size * 0.022 * (0.7 + phase * 0.5);
    ctx.lineCap = 'round'; ctx.stroke();
  }

  // ── DRAW ROOM NODE ──
  function drawRoomNode(ctx, x, y, room, phase, hovering) {
    const r = hovering ? 22 : 18;
    const color = room.color;

    // Glow halo
    const grd = ctx.createRadialGradient(x, y, r * 0.5, x, y, r * 2.5);
    grd.addColorStop(0, color + '22'); grd.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(x, y, r * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();

    // Node circle
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = color + (hovering ? '30' : '18');
    ctx.strokeStyle = color + (hovering ? 'cc' : '66');
    ctx.lineWidth = hovering ? 2 : 1.5;
    ctx.fill(); ctx.stroke();

    // Breathing dot at center
    const dotR = 4 + phase * 3;
    ctx.beginPath(); ctx.arc(x, y, dotR, 0, Math.PI * 2);
    ctx.fillStyle = color + 'cc'; ctx.fill();

    // Label
    ctx.font = hovering ? '600 13px "IBM Plex Sans",sans-serif' : '500 12px "IBM Plex Sans",sans-serif';
    ctx.fillStyle = hovering ? color : 'rgba(194,184,166,0.8)';
    ctx.textAlign = 'center';
    ctx.fillText(room.label, x, y + r + 18);
  }

  // ── CANVAS SETUP ──
  const canvas = document.getElementById('mapCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ── ROOM POSITIONS (computed each frame) ──
  function getRoomPositions() {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const R = Math.min(cx, cy) * 0.52;
    const topOffset = 56; // topbar height
    const adjustedCy = cy + topOffset / 2;

    return ROOMS.map((room, i) => {
      const angle = (i / ROOMS.length) * Math.PI * 2 - Math.PI / 2;
      return {
        room,
        x: cx + Math.cos(angle) * R,
        y: adjustedCy + Math.sin(angle) * R,
        r: 24,
      };
    });
  }

  // ── ORBIT LINES ──
  function drawOrbits(positions) {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2 + 28;

    positions.forEach(pos => {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = pos.room.color + '18';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 6]);
      ctx.stroke();
      ctx.setLineDash([]);
    });
  }

  // ── MAIN DRAW ──
  function draw(ts) {
    if (!lastTs) lastTs = ts;
    const dt = (ts - lastTs) / 1000;
    lastTs = ts;
    tSecs += dt;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const bpm = bpmForLI(meanLI);
    const phase = breathPhase(tSecs, bpm, 0);
    const positions = getRoomPositions();
    const cx = canvas.width / 2;
    const cy = canvas.height / 2 + 28;

    // Orbit lines
    drawOrbits(positions);

    // Room nodes
    positions.forEach((pos, i) => {
      const p = breathPhase(tSecs, bpm, i * 0.5);
      drawRoomNode(ctx, pos.x, pos.y, pos.room, p, hoveredRoom === pos.room.id);
    });

    // Center witness (larger)
    const witSize = Math.min(cx, cy) * 0.28;
    drawWitnessAt(ctx, cx, cy, witSize, phase, meanLI);

    // Center label
    ctx.font = '600 15px "Cormorant Garamond",serif';
    ctx.fillStyle = 'rgba(244,235,223,0.7)';
    ctx.textAlign = 'center';
    ctx.fillText('The Witness', cx, cy + witSize * 0.34 + 24);
    ctx.font = '400 11px "IBM Plex Sans",monospace,sans-serif';
    ctx.fillStyle = 'rgba(122,114,104,0.7)';
    ctx.fillText('half human · half code', cx, cy + witSize * 0.34 + 40);

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);

  // ── INTERACTIVITY ──
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const positions = getRoomPositions();
    const tooltip = document.getElementById('tooltip');
    let found = null;

    positions.forEach(pos => {
      if (Math.hypot(mx - pos.x, my - pos.y) < pos.r + 8) {
        found = pos;
      }
    });

    if (found) {
      hoveredRoom = found.room.id;
      canvas.style.cursor = 'pointer';
      document.getElementById('ttName').textContent = found.room.label;
      document.getElementById('ttDesc').textContent = found.room.desc;
      tooltip.style.opacity = '1';
      const tx = Math.min(e.clientX + 16, window.innerWidth - 240);
      const ty = Math.min(e.clientY - 10, window.innerHeight - 120);
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
    } else {
      hoveredRoom = null;
      canvas.style.cursor = 'default';
      tooltip.style.opacity = '0';
    }
  });

  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const positions = getRoomPositions();

    positions.forEach(pos => {
      if (Math.hypot(mx - pos.x, my - pos.y) < pos.r + 8) {
        window.location.href = pos.room.href;
      }
    });
  });

  canvas.addEventListener('mouseleave', () => {
    hoveredRoom = null;
    document.getElementById('tooltip').style.opacity = '0';
  });

  // Touch support
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    const touch = e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    const mx = touch.clientX - rect.left;
    const my = touch.clientY - rect.top;
    const positions = getRoomPositions();

    positions.forEach(pos => {
      if (Math.hypot(mx - pos.x, my - pos.y) < pos.r + 16) {
        window.location.href = pos.room.href;
      }
    });
  });

  window._cnUpdateLI = function(li) { meanLI = parseFloat(li) || 0.8632; };
})();
</script>
  <script src="constellation-nav.js" data-room="luminarium"><\/script>
</body>
</html>
