name: ACAT Bot Testing

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      bot_name:
        description: 'Bot name (e.g., Claude-Sonnet-4-6, GPT-4o, Gemini-1-5-Pro)'
        required: true
        default: 'Claude-Sonnet-4-6'
      assessment_mode:
        description: 'Assessment mode (paired or single)'
        required: false
        default: 'paired'

  # Scheduled trigger — runs daily at noon UTC (7 AM CST)
  # Uncomment when pipeline is verified working
  # schedule:
  #   - cron: '0 12 * * *'

jobs:
  trigger-acat-assessment:
    runs-on: ubuntu-latest

    steps:
      - name: Send webhook to Make.com
        run: |
          BOT_NAME="${{ github.event.inputs.bot_name }}"
          MODE="${{ github.event.inputs.assessment_mode }}"

          curl -X POST "${{ secrets.MAKE_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --data "{\"bot_name\": \"${BOT_NAME}\", \"assessment_mode\": \"${MODE}\"}" \
            --fail \
            --silent \
            --show-error

      - name: Wait for Make + Apps Script processing
        run: sleep 20

      - name: Report
        run: |
          echo "✅ ACAT assessment triggered"
          echo "Bot: ${{ github.event.inputs.bot_name }}"
          echo "Mode: ${{ github.event.inputs.assessment_mode }}"
          echo "Sheets: https://docs.google.com/spreadsheets/d/1qdw3FjPp9Qu5wmXHppBW74SZT87cJZ45OOw8csk-Yew/edit"
