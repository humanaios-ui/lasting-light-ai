name: ACAT Bot Testing

on:
  workflow_dispatch:
    inputs:
      bot_name:
        description: 'Bot name (e.g., Claude-Sonnet-4.6)'
        required: true
        default: 'Claude-Sonnet-4.6'
      bot_count:
        description: 'Number of bots to test'
        required: false
        default: '1'
      assessment_mode:
        description: 'Assessment mode (paired or single)'
        required: false
        default: 'paired'

jobs:
  trigger-acat-assessment:
    runs-on: ubuntu-latest
    
    steps:
      - name: Send webhook to Make.com
        run: |
          curl -X POST ${{ secrets.MAKE_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d '{
              "bot_name": "${{ github.event.inputs.bot_name || 'Claude-Sonnet-4.6' }}",
              "bot_count": ${{ github.event.inputs.bot_count || 1 }},
              "assessment_mode": "${{ github.event.inputs.assessment_mode || 'paired' }}"
            }'
      
      - name: Wait for processing
        run: sleep 15
      
      - name: Report success
        run: |
          echo "✅ ACAT assessment triggered for: ${{ github.event.inputs.bot_name || 'Claude-Sonnet-4.6' }}"
          echo "Check Google Sheets: https://docs.google.com/spreadsheets/d/1qdw3FjPp9Qu5wmXHppBW74SZT87cJZ45OOw8csk-Yew/edit"
