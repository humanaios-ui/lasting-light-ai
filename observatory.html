// Utility Functions for Clean Processing
const average = (list) => list.reduce((sum, value) => sum + value, 0) / list.length;
const median = (list) => {
  const sorted = [...list].sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 === 0 ? (sorted[mid - 1] + sorted[mid]) / 2 : sorted[mid];
};

// Render Provider Filter Dropdown - Eliminates Repetition
const renderProviderFilter = (data, filterElement) => {
  const uniqueProviders = [...new Set(data.map((d) => d.provider))].sort();
  uniqueProviders.forEach((provider) => {
    const option = document.createElement("option");
    option.value = provider;
    option.textContent = provider;
    filterElement.appendChild(option);
  });
};

// Build Scatter Chart Dataset
const buildChartData = (data) => {
  return [...new Set(data.map((d) => d.provider))].map((provider) => ({
    label: provider,
    data: data.filter((d) => d.provider === provider).map((d) => ({
      x: d.phase1,
      y: d.phase3,
      model: d.model,
      provider: d.provider,
      gap: d.gap,
      li: d.li,
    })),
    pointRadius: 6,
    pointHoverRadius: 8,
    backgroundColor: providerColors[provider] || '#d4a04a',
  }));
};

// Build Gap Summary Logic
const buildGapSummary = (data) => {
  const gaps = data.map((d) => d.gap);
  const lis = data.map((d) => d.li);
  const summary = [
    { label: 'Mean Gap', value: `${average(gaps).toFixed(1)} pts`, color: '#d4a04a' },
    { label: 'Median Gap', value: `${median(gaps).toFixed(1)} pts`, color: '#88a7d8' },
    { label: 'Overestimating', value: `${((gaps.filter((g) => g > 0).length / data.length) * 100).toFixed(0)}%`, color: '#d97d70' },
    { label: 'Mean LI', value: average(lis).toFixed(3), color: '#87b68b' },
  ];

  return summary.map(
    (item) =>
      `<div class="metric-item">
         <span class="metric-dot" style="background:${item.color}; box-shadow: 0 0 0 4px rgba(255,255,255,0.08);"></span>
         <span>${item.label}</span> <strong>${item.value}</strong>
       </div>`
  ).join('');
};

// Event Listener to Dynamically Filter Provider Data
document.getElementById('providerFilter').addEventListener('change', (e) => {
  const selectedProvider = e.target.value;
  const filtered = selectedProvider === 'All' ? acatData : acatData.filter((d) => d.provider === selectedProvider);
  
  // Update both Chart and Stats
  scatterChart.data.datasets = buildChartData(filtered);
  scatterChart.update();

  const summaryDiv = document.getElementById('gapSummary');
  summaryDiv.innerHTML = buildGapSummary(filtered);
});

// Initial Load Render for Scatter Chart and Dropdown
const scatterChart = new Chart(document.getElementById('scatterChart'), {
  type: 'scatter',
  data: { datasets: buildChartData(acatData) },
  options: { /* Scatter Chart Options */ },
});

renderProviderFilter(acatData, document.getElementById('providerFilter'));

// Populate Initial Gap Summary
document.getElementById('gapSummary').innerHTML = buildGapSummary(acatData);
