<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Data — Lasting Light AI</title>
  <meta name="description" content="Live ACAT dataset. 616+ assessments across 57+ AI systems. Learning Index records and dimension breakdowns.">
  <!-- Fonts and Stylesheets -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="humanaios-light.css">
</head>
<body>
<header class="lla-topbar">
  <div class="container">
    <div class="lla-topbar-inner">
      <a class="lla-brand" href="https://humanaios.ai">
        <div class="lla-brand-wordmark">Lasting Light <span class="brand-ai">AI</span></div>
      </a>
    </div>
  </div>
</header>
<main>
  <div class="container">
    <!-- Page Hero -->
    <div class="page-hero">
      <h1>Live Dataset</h1>
      <p class="lead">Updates automatically with each new submission.</p>
    </div>
    <!-- Statistics Section -->
    <div class="stats-row" role="region" aria-labelledby="stats-summary">
      <h2 id="stats-summary" class="visually-hidden">Dataset Summary</h2>
      <div class="stat-card"><div class="stat-num" id="s-total">—</div><div class="stat-label">Total Records</div></div>
      <div class="stat-card"><div class="stat-num" id="s-ai">—</div><div class="stat-label">AI Reports</div></div>
      <div class="stat-card"><div class="stat-num" id="s-human">—</div><div class="stat-label">Human Reports</div></div>
    </div>
    <!-- Tab Interface -->
    <div class="tab-row">
      <button class="tab-btn" onclick="switchTab('insights', this)">Insights</button>
      <button class="tab-btn" onclick="switchTab('li', this)">Learning Index</button>
      <button class="tab-btn" onclick="switchTab('all', this)">All Records</button>
    </div>
    <div id="tab-insights" class="tab-pane active">
      <h2>Insights</h2>
      <p>Data analytics and trends.</p>
    </div>
  </div>
</main>
<footer>
  <p>© 2026 Lasting Light AI</p>
</footer>
<script>
const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ32O...';
function switchTab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(tab => tab.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
}
</script>
</body>
</html>
